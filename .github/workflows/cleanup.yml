name: Purge stale staging images

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  purge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so we can read each file's commit date

      - name: Delete staging files whose last commit is older than 7 days
        run: |
          set -euo pipefail
          if [ ! -d staging ]; then
            echo "No staging/ folder yet, nothing to purge."
            exit 0
          fi
          cutoff=$(( $(date +%s) - 7*24*60*60 ))
          echo "Cutoff: $(date -u -d @$cutoff) — anything committed before this is stale."
          deleted=0
          while IFS= read -r -d '' f; do
            ts=$(git log -1 --format=%ct -- "$f")
            if [ -z "$ts" ]; then
              echo "skip (not committed yet): $f"
              continue
            fi
            if [ "$ts" -lt "$cutoff" ]; then
              echo "purging (committed $(date -u -d @$ts)): $f"
              rm -f "$f"
              deleted=$((deleted+1))
            fi
          done < <(find staging/ -type f ! -name '.gitkeep' -print0)
          echo "Purged $deleted file(s)."

      - name: Commit deletions if any
        run: |
          set -euo pipefail
          git config user.name "Pin Staging Janitor"
          git config user.email "actions@github.com"
          git add -A staging/ || true
          if git diff --staged --quiet; then
            echo "Nothing to purge today."
          else
            git commit -m "Auto-purge: staging images older than 7 days"
            git push
          fi
